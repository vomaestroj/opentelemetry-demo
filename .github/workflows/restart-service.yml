name: Restart Service

on:
  workflow_dispatch:
    inputs:
      service_name:
        description: "Service name (must match K8s deployment name)"
        required: true
      port_context:
        description: "Port.io context (runId, blueprint, entity)"
        required: true

jobs:
  restart:
    runs-on: ubuntu-latest

    steps:
      # --------------------------------------------------------
      # 1. Notify Port - In Progress
      # --------------------------------------------------------
      - name: Notify Port - In Progress
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ fromJson(inputs.port_context).runId }}
          logMessage: "🔄 Starting restart of service: ${{ inputs.service_name }}..."

      # --------------------------------------------------------
      # 2. SSH into EC2, scale up & rollout restart
      # --------------------------------------------------------
      - name: SSH into EC2 and Restart Service
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            export KUBECONFIG=/home/${{ secrets.EC2_USER }}/.kube/config
            export PATH=$PATH:/usr/local/bin:/snap/bin

            SERVICE="${{ inputs.service_name }}"
            NAMESPACE="default"

            echo "🔍 Checking deployment: $SERVICE"
            kubectl get deployment/$SERVICE -n $NAMESPACE

            # Step 1 - Always scale to 1 first (handles replicas=0 edge case)
            echo "⚙️  Ensuring $SERVICE has at least 1 replica..."
            kubectl scale deployment/$SERVICE --replicas=1 -n $NAMESPACE

            echo "⏳ Waiting for scale-up to complete..."
            kubectl rollout status deployment/$SERVICE -n $NAMESPACE --timeout=120s

            # Step 2 - Rollout restart
            echo "🔄 Performing rollout restart of $SERVICE..."
            kubectl rollout restart deployment/$SERVICE -n $NAMESPACE

            echo "⏳ Waiting for rollout restart to complete..."
            kubectl rollout status deployment/$SERVICE -n $NAMESPACE --timeout=120s

            # Step 3 - Print final status
            echo "✅ Final status:"
            kubectl get deployment/$SERVICE -n $NAMESPACE

      # --------------------------------------------------------
      # 3. Notify Port - Success
      # --------------------------------------------------------
      - name: Notify Port - Success
        if: success()
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ fromJson(inputs.port_context).runId }}
          status: "SUCCESS"
          logMessage: "✅ ${{ inputs.service_name }} restarted successfully"

      # --------------------------------------------------------
      # 4. Notify Port - Failure
      # --------------------------------------------------------
      - name: Notify Port - Failure
        if: failure()
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ fromJson(inputs.port_context).runId }}
          status: "FAILURE"
          logMessage: "❌ Failed to restart ${{ inputs.service_name }} - check GitHub Actions logs for details"
